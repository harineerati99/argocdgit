apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vdb2
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/harineerati99/argocdgit.git
    targetRevision: main
    path: apps/vdb2
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: pg-oper-driver
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
